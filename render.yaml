services:
  - type: web
    name: telegram-clock
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_clock.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: YOUR_NAME
        sync: false
      - key: TZ_OFFSET
        value: "3"
